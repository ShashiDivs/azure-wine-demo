name: Build and Deploy Azure

on:
  push:
    branches:
        - main
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4


      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run tests
        run: |
          python test_project.py

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{secrets.AZURE_CREDENTIALS}}

      - name: Configure Azure Web App settings
        run: |
          az webapp config appsettings set \
            --resource-group wine-classifier-rg \
            --name ${{secrets.AZURE_WEBAPP_NAME}} \
            --settings WEBSITES_PORT=8000 SCM_DO_BUILD_DURING_DEPLOYMENT=true

          az webapp config set \
            --resource-group wine-classifier-rg \
            --name ${{secrets.AZURE_WEBAPP_NAME}} \
            --startup-file "bash startup.sh"


      - name: Deploy using az webapp up
        run: |
          az webapp up \
            --resource-group wine-classifier-rg \
            --plan ${{secrets.AZURE_WEBAPP_NAME}} \
            --runtime "PYTHON|3.11" \
            --os.type linux \
            --logs
        





    

